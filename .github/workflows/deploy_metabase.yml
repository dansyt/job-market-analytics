name: Deploy Metabase (Job Market Analytics)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Export the secrets as environment variables for docker-compose
      SUPABASE_HOST: ${{ secrets.SUPABASE_HOST }}
      SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
      SUPABASE_DB: ${{ secrets.SUPABASE_DB }}
      SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
      SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub (optional – needed if you pull private images)
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull latest Metabase image
        run: docker pull metabase/metabase:latest

      - name: Deploy stack with docker‑compose
        run: |
          docker compose -f docker-compose.yml up -d --remove-orphans

      - name: Verify Metabase is running
        run: |
          docker ps --filter "name=metabase_job_market"

      - name: Post‑deployment health check (optional)
        uses: jtalk/url-health-check-action@v2
        with:
          url: http://localhost:3000/api/health
          max-attempts: 5
          retry-delay: 10

      # (Optional) push logs as artifact for debugging
      - name: Collect container logs
        if: failure()
        run: |
          docker logs metabase_job_market > metabase.log
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: metabase-logs
          path: metabase.log
