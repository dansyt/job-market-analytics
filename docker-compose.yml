version: "3.8"

services:
  metabase:
    image: metabase/metabase:latest
    container_name: metabase_job_market
    ports:
      - "3000:3000"
    environment:
      # Use Supabase connection via .env file (placed in same folder)
      - MB_DB_TYPE=postgres
      - MB_DB_HOST=${SUPABASE_HOST}
      - MB_DB_PORT=${SUPABASE_PORT}
      - MB_DB_DBNAME=${SUPABASE_DB}
      - MB_DB_USER=${SUPABASE_USER}
      - MB_DB_PASS=${SUPABASE_PASSWORD}
      - MB_DB_SSL=true
    # No need to depend on a local db; Supabase is external

