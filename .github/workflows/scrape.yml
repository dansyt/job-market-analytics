name: Kalibrr Scraper

# --------------------------------------------------------------
# 1️⃣ Permissions – allow the default GITHUB_TOKEN to push
# --------------------------------------------------------------
permissions:
  contents: write   # needed for git push
  actions: read

on:
  schedule:
    - cron: "0 0 * * *"  # daily at 00:00 UTC
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------------------
      # 2️⃣ Checkout the repo – full history so we can push
      # --------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for a push from a branch

      # --------------------------------------------------------
      # 3️⃣ Set up Python
      # --------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # --------------------------------------------------------
      # 4️⃣ Install dependencies
      # --------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas supabase

      # --------------------------------------------------------
      # 5️⃣ Run the scraper (creates a timestamped CSV)
      # --------------------------------------------------------
      - name: Run scraper
        id: scrape
        run: |
          python scraper.py --output kalibrr_jobs.csv
          # Capture the most recent timestamped CSV (handles multiple matches)
          CSV_FILE=$(ls -t kalibrr_jobs_*.csv 2>/dev/null | head -n1 || echo kalibrr_jobs.csv)
          echo "csv_file=$CSV_FILE" >> $GITHUB_OUTPUT

      # --------------------------------------------------------
      # 6️⃣ Upload CSV as an artifact (still handy)
      # --------------------------------------------------------
      - name: Upload CSV artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kalibrr_jobs
          path: result_csv/

      # --------------------------------------------------------
      # 7️⃣ Upload CSV to Supabase
      # --------------------------------------------------------
      - name: Upload CSV to Supabase
        if: success()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python upload_to_supabase.py --file ${{ steps.scrape.outputs.csv_file }}
      - name: Delete CSV file after upload
        if: always()
        run: |
          rm -f ${{ steps.scrape.outputs.csv_file }}
